<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Task - HandyManager</title>
    <link rel="stylesheet" href="css/styles.css?v=1.4">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
    <style>
        .button-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 16px;
        }

        .submit-btn {
            flex: 3;
        }

        .cancel-btn {
            flex: 1;
        }

        #notes {
            min-height: 200px;
            resize: none;
        }

        @media (max-width: 599px) {
            .button-row {
                flex-direction: column;
            }

            .submit-btn, .cancel-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HandyManager</h1>
        </header>
        <main>
            <h2>Complete Task</h2>
            <form id="complete-task-form">
                <div class="form-group">
                    <label for="notes">Notes:</label>
                    <textarea id="notes" placeholder="Notes:
-

Materials:
- "></textarea>
                </div>
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="end-date">End Date:</label>
                    <input type="date" id="end-date" required>
                </div>
                <div class="form-group">
                    <label for="end-time">End Time:</label>
                    <input type="time" id="end-time" required>
                </div>
                <div class="button-row">
                    <button type="submit" class="primary-btn submit-btn">Complete Task</button>
                    <button type="button" class="cancel-btn" onclick="window.location.href='./'">Cancel</button>
                </div>
            </form>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const completeTaskForm = document.getElementById('complete-task-form');
            const notesField = document.getElementById('notes');
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('id');

            document.getElementById('task-id').value = taskId;

            // Prefill end date and time with current date and time
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');

            document.getElementById('end-date').value = `${year}-${month}-${day}`;
            document.getElementById('end-time').value = `${hours}:${minutes}`;

            // Prefill notes with template if empty
            if (!notesField.value.trim()) {
                notesField.value = "Notes:\n- \n\nMaterials:\n- ";
            }

            // Handle form submission
            completeTaskForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const token = localStorage.getItem('handymanager_token');
                const techName = localStorage.getItem('handymanager_tech_name');
                const endDate = document.getElementById('end-date').value;
                const endTime = document.getElementById('end-time').value;
                const notes = notesField.value; // Don't trim whitespace to preserve formatting

                if (!token || !techName) {
                    alert('Please set your token and tech name in settings first.');
                    window.location.href = './';
                    return;
                }

                fetch('complete-task.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        tech_name: techName,
                        task_id: taskId,
                        end_time: `${endDate} ${endTime}`,
                        notes: notes
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = './';
                    } else {
                        alert('Error completing task: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error completing task. Please try again.');
                });
            });

            // Handle auto-inserting "- " when pressing enter after a dash line
            notesField.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const cursorPosition = this.selectionStart;
                    const text = this.value;
                    const beforeCursor = text.substring(0, cursorPosition);
                    const lines = beforeCursor.split('\n');
                    const currentLine = lines[lines.length - 1];

                    if (currentLine.trim().startsWith('-')) {
                        e.preventDefault();
                        this.value = text.substring(0, cursorPosition) + '\n- ' + text.substring(cursorPosition);
                        this.setSelectionRange(cursorPosition + 3, cursorPosition + 3);
                    }
                }
            });

            // Adjust textarea height to fill viewport
            function adjustTextareaHeight() {
                const viewportHeight = window.innerHeight;
                const containerHeight = document.querySelector('.container').offsetHeight;
                const notesHeight = notesField.offsetHeight;

                const availableHeight = viewportHeight - (containerHeight - notesHeight);
                notesField.style.height = Math.max(200, availableHeight) + 'px';
            }

            adjustTextareaHeight();
            window.addEventListener('resize', adjustTextareaHeight);

            // Scroll submit button into view when focused on mobile
            notesField.addEventListener('focusin', () => {
                // Delay to allow the keyboard to fully open
                setTimeout(() => {
                    document.querySelector('.submit-btn').scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }, 500);
            });
        });
    </script>
</body>
</html>
