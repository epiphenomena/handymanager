<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyManager</title>
    <link rel="stylesheet" href="css/styles.css?v=2.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4CAF50">
</head>
<body>
    <div class="container">
        <header>
            <h1>HandyManager</h1>
        </header>
        <main>
            <div id="settings-section" style="display: none;">
                <h2>Settings</h2>
                <form id="settings-form">
                    <div class="form-group">
                        <label for="token">Token:</label>
                        <input type="text" id="token" required>
                    </div>
                    <div class="form-group">
                        <label for="tech-name">Tech Name:</label>
                        <input type="text" id="tech-name" required>
                    </div>
                    <button type="submit">Save Settings</button>
                </form>
                <div class="pwa-instructions-link">
                    <h3>Install as App</h3>
                    <div id="pwa-instructions">
                        <ul>
                            <li><strong>Android Chrome:</strong> Tap the menu (three dots) and select "Add to Home screen"</li>
                            <li><strong>iOS Safari:</strong> Tap the share button and select "Add to Home Screen"</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div id="tasks-section">
                <div class="header-controls">
                    <h2>In Progress</h2>
                    <div class="button-group">
                        <button id="settings-btn" class="secondary-btn">Settings</button>
                        <button id="history-btn" class="secondary-btn">History</button>
                    </div>
                </div>
                <ul id="tasks-list"></ul>
                <button id="new-task-btn" class="primary-btn">Start New Task</button>
            </div>

            <div id="history-section" style="display: none;">
                <div class="header-controls">
                    <h2>History</h2>
                    <button id="back-to-tasks-btn" class="secondary-btn">Back</button>
                </div>
                <ul id="history-list"></ul>
            </div>
        </main>
    </div>

    <script src="js/offline.js?v=1"></script>
    <script>
        // Register service worker for PWA functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(function(registration) {
                        registration.update(); // check for a new version on every open
                    })
                    .catch(function(err) {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });

            // When a new service worker takes over, reload once so the page
            // and its assets come from the new version (busts legacy installs)
            let refreshed = false;
            navigator.serviceWorker.addEventListener('controllerchange', function() {
                if (refreshed) return;
                refreshed = true;
                window.location.reload();
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const settingsForm = document.getElementById('settings-form');
            const settingsSection = document.getElementById('settings-section');
            const tasksSection = document.getElementById('tasks-section');
            const historySection = document.getElementById('history-section');
            const tasksList = document.getElementById('tasks-list');
            const historyList = document.getElementById('history-list');
            const newTaskBtn = document.getElementById('new-task-btn');
            const settingsBtn = document.getElementById('settings-btn');
            const historyBtn = document.getElementById('history-btn');
            const backToTasksBtn = document.getElementById('back-to-tasks-btn');

            // Load saved settings
            const savedToken = localStorage.getItem('handymanager_token');
            const savedTechName = localStorage.getItem('handymanager_tech_name');

            if (savedToken && savedTechName) {
                document.getElementById('token').value = savedToken;
                document.getElementById('tech-name').value = savedTechName;
                showTasksSection();
                loadTasks(savedToken, savedTechName);
            } else {
                showSettingsSection();
            }

            // Handle settings form submission
            settingsForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const token = document.getElementById('token').value.trim();
                const techName = document.getElementById('tech-name').value.trim();

                if (!token || !techName) {
                    alert('Please fill in both token and tech name');
                    return;
                }

                localStorage.setItem('handymanager_token', token);
                localStorage.setItem('handymanager_tech_name', techName);

                showTasksSection();
                loadTasks(token, techName);
            });

            newTaskBtn.addEventListener('click', function() {
                window.location.href = 'new-task.html';
            });

            settingsBtn.addEventListener('click', function() {
                showSettingsSection();
            });

            historyBtn.addEventListener('click', function() {
                const token = localStorage.getItem('handymanager_token');
                const techName = localStorage.getItem('handymanager_tech_name');

                if (!token || !techName) {
                    showSettingsSection();
                    return;
                }

                showHistorySection();
                loadHistory(token, techName);
            });

            backToTasksBtn.addEventListener('click', function() {
                showTasksSection();
            });

            function showTasksSection() {
                settingsSection.style.display = 'none';
                historySection.style.display = 'none';
                tasksSection.style.display = 'block';
            }

            function showSettingsSection() {
                tasksSection.style.display = 'none';
                historySection.style.display = 'none';
                settingsSection.style.display = 'block';
            }

            function showHistorySection() {
                tasksSection.style.display = 'none';
                settingsSection.style.display = 'none';
                historySection.style.display = 'block';
            }

            // Format date without seconds and year: MM/DD HH:MM (24-hour format)
            function formatDateWithoutSecondsOrYear(date) {
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                return `${month}/${day} ${hours}:${minutes}`;
            }

            // Load in-progress tasks: sync any queued offline work first, then
            // fetch fresh; fall back to the last-known list when offline
            function loadTasks(token, techName) {
                hmOffline.syncQueue()
                .then(() => fetch('get-tasks.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, tech_name: techName })
                }))
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        hmOffline.cacheSet('tasks', data.tasks);
                        displayTasks(data.tasks);
                    } else {
                        alert('Error loading tasks: ' + data.message);
                    }
                })
                .catch(() => {
                    // Offline: show the last-known list plus anything queued
                    displayTasks(hmOffline.cacheGet('tasks') || []);
                });
            }

            // Load history from backend; fall back to last-known when offline
            function loadHistory(token, techName) {
                fetch('get-latest-tasks.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, tech_name: techName })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        hmOffline.cacheSet('history', data.tasks);
                        displayHistory(data.tasks);
                    } else {
                        alert('Error loading history: ' + data.message);
                    }
                })
                .catch(() => {
                    displayHistory(hmOffline.cacheGet('history') || []);
                });
            }

            // Display in-progress tasks: server tasks (minus those with a
            // queued completion) plus tasks started offline and not yet synced
            function displayTasks(tasks) {
                tasksList.innerHTML = '';

                const queuedCompletions = hmOffline.completedTaskIds();
                const serverTasks = tasks.filter(task => !queuedCompletions.has(String(task.id)));
                const offlineTasks = hmOffline.pendingTasks();

                if (serverTasks.length === 0 && offlineTasks.length === 0) {
                    const noTasksItem = document.createElement('li');
                    noTasksItem.textContent = 'No in-progress tasks';
                    tasksList.appendChild(noTasksItem);
                    return;
                }

                function addItem(href, label) {
                    const listItem = document.createElement('li');
                    const link = document.createElement('a');
                    link.href = href;
                    link.className = 'job-link';
                    link.textContent = label;
                    listItem.appendChild(link);
                    tasksList.appendChild(listItem);
                }

                serverTasks.forEach(task => {
                    addItem(`complete-task.html?id=${task.id}`,
                        `${task.job_name} - Started: ${formatDateWithoutSecondsOrYear(new Date(task.start_time))}`);
                });

                offlineTasks.forEach(task => {
                    addItem(`complete-task.html?uuid=${encodeURIComponent(task.uuid)}`,
                        `${task.job_name} - Started: ${formatDateWithoutSecondsOrYear(new Date(task.start_time))} (saved offline)`);
                });
            }

            // Display history in the list
            function displayHistory(tasks) {
                historyList.innerHTML = '';

                if (tasks.length === 0) {
                    const noTasksItem = document.createElement('li');
                    noTasksItem.textContent = 'No history';
                    historyList.appendChild(noTasksItem);
                    return;
                }

                tasks.forEach(task => {
                    const listItem = document.createElement('li');
                    listItem.className = 'history-item';

                    const taskInfo = document.createElement('div');
                    taskInfo.className = 'job-info';

                    const jobName = document.createElement('div');
                    jobName.className = 'job-location';
                    jobName.textContent = task.job_name;

                    const timeInfo = document.createElement('div');
                    timeInfo.className = 'job-time';
                    const startTime = formatDateWithoutSecondsOrYear(new Date(task.start_time));
                    const endTime = task.end_time ? formatDateWithoutSecondsOrYear(new Date(task.end_time)) : 'In Progress';
                    timeInfo.textContent = `Started: ${startTime} | Ended: ${endTime}`;

                    const editBtn = document.createElement('button');
                    editBtn.className = 'edit-btn';
                    editBtn.textContent = 'Edit';
                    editBtn.onclick = function() {
                        window.location.href = `edit-task.html?id=${task.id}`;
                    };

                    taskInfo.appendChild(jobName);
                    taskInfo.appendChild(timeInfo);
                    listItem.appendChild(taskInfo);
                    listItem.appendChild(editBtn);
                    historyList.appendChild(listItem);
                });
            }
        });
    </script>
</body>
</html>
